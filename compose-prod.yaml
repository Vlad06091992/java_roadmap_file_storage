services:
  app:
    build:
      context: .
    container_name: cloud-storage-app
    ports:
      - "8082:8081"
    networks:
      - claude_storage
    environment: # ← ДОБАВЬТЕ ЭТО

      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_REDIS_HOST=redis  # ← ДОБАВЬТЕ ЭТИ две строки
      - SPRING_REDIS_PORT=6379   # ← на случай, если используется spring.redis (без data)
      - SPRING_DATA_REDIS_URL=redis://redis:6379
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/file_storage
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
    depends_on:
      - redis
      - postgres
  redis:
    image: 'redis:latest'
    ports:
      - '6379:6379'
    networks:
      - claude_storage
  minio:
    image: quay.io/minio/aistor/minio:latest
    container_name: aistor-server
    networks:
      - claude_storage
    ports:
      - "9000:9000"   # S3 API Port
      - "9001:9001"   # MinIO Console Web UI Port
    volumes:
      - $HOME/minio/data:/mnt/data
      - $HOME/minio/minio.license:/minio.license
      - $HOME/minio/certs:/etc/minio/certs
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: minio server /mnt/data --license /minio.license
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: file_storage_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: file_storage
    ports:
      - '5441:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - claude_storage
networks:
    claude_storage:
volumes:
    postgres_data:
